<meta charset="UTF-8">

<title>Hiring Tracker — Video Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0eeeb;
    --surface: #faf9f7;
    --surface2: #e8e6e2;
    --border: #dedad4;
    --border2: #ccc8c0;
    --text: #1a1a1a;
    --muted: #8a8680;
    --subtle: #b8b4ae;
    --green: #3d7a5c;
    --yellow: #9a7c2e;
    --red: #8c3a3a;
    --blue: #3a5c8c;
    --purple: #6b4d8a;
    --email: #2d6b5a;
    --mono: 'DM Mono', monospace;
    --sans: 'Jost', sans-serif;
    --display: 'Playfair Display', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* HEADER */
  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
    font-family: var(--display);
  }
  .header-left p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }
  .stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
    border: 1px solid;
  }
  .stat.total  { background: rgba(0,0,0,0.04); border-color: var(--border2); color: var(--text); }
  .stat.new    { background: rgba(61,122,92,0.08);  border-color: rgba(61,122,92,0.3);  color: var(--green); }
  .stat.interview { background: rgba(58,92,140,0.08); border-color: rgba(58,92,140,0.3); color: var(--blue); }
  .stat.hired  { background: rgba(107,77,138,0.08); border-color: rgba(107,77,138,0.3); color: var(--purple); }
  .stat.rejected { background: rgba(140,58,58,0.08); border-color: rgba(140,58,58,0.3); color: var(--red); }

  /* FILTERS */
  .filters {
    padding: 16px 40px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #444; color: var(--text); }
  .filter-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .search {
    margin-left: auto;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    width: 200px;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: #444; }
  .search::placeholder { color: var(--muted); }

  /* TABLE */
  .table-wrap { padding: 24px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: #f5f3f0; }
  tbody td {
    padding: 14px 14px;
    font-size: 14px;
    vertical-align: middle;
  }
  .candidate-name { font-weight: 600; color: var(--text); font-family: var(--display); font-size: 15px; letter-spacing: 0.1px; }
  .candidate-email { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .date-text { font-family: var(--mono); font-size: 12px; color: var(--muted); }

  /* STATUS BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    border: 1px solid;
    white-space: nowrap;
  }
  .badge::before { content: '●'; font-size: 8px; }
  .badge.new        { background: rgba(61,122,92,0.08);  border-color: rgba(61,122,92,0.25);  color: var(--green); }
  .badge.pending    { background: rgba(154,124,46,0.08); border-color: rgba(154,124,46,0.25); color: var(--yellow); }
  .badge.interview  { background: rgba(58,92,140,0.08);  border-color: rgba(58,92,140,0.25);  color: var(--blue); }
  .badge.hired      { background: rgba(107,77,138,0.08); border-color: rgba(107,77,138,0.25); color: var(--purple); }
  .badge.rejected   { background: rgba(140,58,58,0.08);  border-color: rgba(140,58,58,0.25);  color: var(--red); }
  .badge.emailed    { background: rgba(45,107,90,0.08);  border-color: rgba(45,107,90,0.25);  color: var(--email); }

  /* ACTION BUTTONS */
  .actions { display: flex; gap: 6px; }
  .btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-interview { background: rgba(58,92,140,0.07); border-color: rgba(58,92,140,0.25); color: var(--blue); }
  .btn-interview:hover { background: rgba(58,92,140,0.14); }
  .btn-hire      { background: rgba(107,77,138,0.07); border-color: rgba(107,77,138,0.25); color: var(--purple); }
  .btn-hire:hover { background: rgba(107,77,138,0.14); }
  .btn-reject    { background: rgba(140,58,58,0.07);  border-color: rgba(140,58,58,0.25); color: var(--red); }
  .btn-reject:hover { background: rgba(140,58,58,0.14); }
  .btn-reset     { background: rgba(0,0,0,0.03); border-color: var(--border2); color: var(--muted); }
  .btn-reset:hover { color: var(--text); border-color: var(--text); }
  .btn-email     { background: rgba(45,107,90,0.07); border-color: rgba(45,107,90,0.25); color: var(--email); }
  .btn-email:hover { background: rgba(45,107,90,0.14); }
  .btn-email.emailed-done { background: rgba(45,107,90,0.18); border-color: rgba(45,107,90,0.5); font-weight:700; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--muted); font-family: var(--mono); margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-family: var(--mono); }
  .modal-field input,
  .modal-field textarea,
  .modal-field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  .modal-field input:focus,
  .modal-field textarea:focus,
  .modal-field select:focus { border-color: #555; }
  .modal-field textarea { resize: vertical; min-height: 80px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.15s; }
  .btn-cancel { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn-cancel:hover { color: var(--text); border-color: #444; }
  .btn-confirm { background: var(--text); border-color: var(--text); color: var(--surface); }
  .btn-confirm:hover { opacity: 0.9; }
  .btn-confirm.red { background: var(--red); border-color: var(--red); color: white; }

  /* NOTES COLUMN */
  .notes-text { font-size: 12px; color: var(--muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .interview-time { font-family: var(--mono); font-size: 12px; color: var(--blue); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  /* PORTFOLIO LINK */
  .portfolio-link { font-size: 12px; color: var(--blue); text-decoration: none; font-family: var(--mono); }
  .portfolio-link:hover { text-decoration: underline; }
  .no-portfolio { font-size: 12px; color: var(--muted); font-family: var(--mono); }
</style>

let currentFilter = 'all';
let currentSearch = '';
let modalAction = null;
let modalCandidateId = null;


// ── STATUS DROPDOWN ───────────────────────────────────────────────
function changeStatus(id, newStatus) {
  const c = candidates.find(x => x.id === id);
  if (c) {
    c.status = newStatus;
    // Update the select colour class instantly
    const selects = document.querySelectorAll('.status-select');
    selects.forEach(s => {
      if (s.onchange.toString().includes(`(${id},`)) {
        s.className = 'status-select ' + newStatus;
      }
    });
    renderStats();
  }
}

// ── CV STORE + VIEWER ─────────────────────────────────────────────
const cvStore = {}; // { cv_1: dataURL, cv_2: dataURL, ... }

function openCV(id) {
  const c = candidates.find(x => x.id === id);
  if (!c) return;
  currentCVId = id;
  document.getElementById('cv-modal-title').textContent = c.name;
  document.getElementById('cv-file-input').onchange = handleCVUpload;

  const stored = cvStore['cv_' + id];

  if (stored) {
    // Locally uploaded file takes priority
    showCVFile(stored);
  } else if (c.cvUrl) {
    // Load directly from GitHub
    const frame = document.getElementById('cv-frame');
    const empty = document.getElementById('cv-empty');
    empty.style.display = 'none';
    frame.style.display = 'block';
    // PDF viewer via Google Docs for cross-origin PDFs
    if (c.cvUrl.endsWith('.pdf')) {
      frame.src = 'https://docs.google.com/viewer?url=' + encodeURIComponent(c.cvUrl) + '&embedded=true';
    } else if (c.cvUrl.endsWith('.docx')) {
      frame.src = 'https://docs.google.com/viewer?url=' + encodeURIComponent(c.cvUrl) + '&embedded=true';
    } else {
      frame.src = c.cvUrl;
    }
    document.getElementById('cv-indicator').style.display = 'block';
  } else {
    // No CV at all
    document.getElementById('cv-frame').style.display = 'none';
    document.getElementById('cv-empty').style.display = 'flex';
    document.getElementById('cv-empty-text').textContent =
      c.cvFile ? `CV file: ${c.cvFile}\nNot found in repo. Check filename matches exactly.` :
      `No CV provided by ${c.name}.`;
    document.getElementById('cv-indicator').style.display = 'none';
  }
  document.getElementById('cv-overlay').classList.add('open');
}

let currentCVId = null;

function handleCVUpload(event) {
  const file = event.target.files[0];
  if (!file || !currentCVId) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    cvStore['cv_' + currentCVId] = { url: e.target.result, name: file.name, type: file.type };
    showCVFile(cvStore['cv_' + currentCVId]);
    render(); // refresh CV button colour
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function showCVFile(stored) {
  const frame = document.getElementById('cv-frame');
  const empty = document.getElementById('cv-empty');
  empty.style.display = 'none';
  frame.style.display = 'block';
  frame.src = stored.url;
  document.getElementById('cv-indicator').style.display = 'block';
}

function closeCV() {
  document.getElementById('cv-overlay').classList.remove('open');
  document.getElementById('cv-frame').src = '';
}
function closeCVOutside(e) {
  if (e.target === document.getElementById('cv-overlay')) closeCV();
}

// ── STATUS CONFIG ────────────────────────────────────────────────────
const STATUS_LABELS = {

// ── RENDER ───────────────────────────────────────────────────────────
function render() {
  const body = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const filtered = candidates.filter(c => {
    const matchFilter = currentFilter === 'all' || c.status === currentFilter;
    const matchSearch = !currentSearch ||
      c.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
      c.email.toLowerCase().includes(currentSearch.toLowerCase());
    return matchFilter && matchSearch;
  });

  if (!filtered.length) {
    body.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    body.innerHTML = filtered.map((c, i) => `
      <tr onclick="openNotes(${c.id})">
        <td class="date-text" style="white-space:nowrap">
          ${String(i+1).padStart(2,'0')}
          <button onclick="event.stopPropagation();openCV(${c.id})" title="View CV"
            style="margin-left:6px;background:${cvStore['cv_'+c.id]||c.cvUrl?'rgba(61,122,92,0.12)':'rgba(0,0,0,0.04)'};border:1px solid ${cvStore['cv_'+c.id]||c.cvUrl?'rgba(61,122,92,0.3)':'var(--border2)'};border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:${cvStore['cv_'+c.id]||c.cvUrl?'var(--green)':'var(--muted)'};font-family:var(--mono);">
            ${cvStore['cv_'+c.id]?'📄 CV':c.cvUrl?'📄 CV':'+ CV'}
          </button>
        </td>
        <td>
          <div class="candidate-name">${c.name}</div>
          <div class="candidate-email">${c.email}</div>
          ${c.age||c.gender ? `<div style="font-size:11px;color:var(--subtle);margin-top:2px;font-family:var(--mono)">${[c.age?c.age+'y':'',c.gender].filter(Boolean).join(' · ')}</div>` : ''}
        </td>
        <td>
          ${c.phone ? `<div style="font-family:var(--mono);font-size:12px;color:var(--text)">${c.phone}</div>` : '<span style="color:var(--subtle);font-size:12px">—</span>'}
        </td>
        <td class="date-text">${c.applied.split(' ')[0]}</td>
        <td onclick="event.stopPropagation()">
          <select class="status-select ${c.status}" onchange="changeStatus(${c.id}, this.value)" title="Change status">
            <option value="new"       ${c.status==='new'       ?'selected':''}>New</option>
            <option value="pending"   ${c.status==='pending'   ?'selected':''}>Pending Review</option>
            <option value="interview" ${c.status==='interview' ?'selected':''}>Interview</option>
            <option value="hired"     ${c.status==='hired'     ?'selected':''}>Hired</option>
            <option value="rejected"  ${c.status==='rejected'  ?'selected':''}>Rejected</option>
          </select>
        </td>
        <td>${c.interview ? `<span class="interview-time">${c.interview}</span>` : '<span style="color:var(--muted);font-size:12px">—</span>'}</td>
        <td>${c.portfolio ? `<a class="portfolio-link" href="${c.portfolio}" target="_blank" onclick="event.stopPropagation()">View ↗</a>` : (c.cvFile ? '<span style="font-size:11px;color:var(--subtle);font-family:var(--mono)">CV only</span>' : '<span class="no-portfolio">—</span>')}</td>
        <td><span class="notes-text">${c.notes || '—'}</span></td>
        <td onclick="event.stopPropagation()">
          <div class="actions">
            <button class="btn btn-email ${c.emailed ? 'emailed-done' : ''}" onclick="toggleEmailed(${c.id})" title="${c.emailed ? 'Email sent — click to undo' : 'Mark email as sent'}">
              ${c.emailed ? '✉ Sent' : '✉ Email'}
            </button>
            ${c.status !== 'interview' && c.status !== 'hired' && c.status !== 'rejected' ?
              `<button class="btn btn-interview" onclick="openSchedule(${c.id})">📅 Interview</button>` : ''}
            ${c.status !== 'hired' && c.status !== 'rejected' ?
              `<button class="btn btn-hire" onclick="openHire(${c.id})">✓ Hire</button>` : ''}
            ${c.status !== 'rejected' ?
              `<button class="btn btn-reject" onclick="openReject(${c.id})">✕ Reject</button>` : ''}
            ${c.status === 'rejected' || c.status === 'hired' ?
              `<button class="btn btn-reset" onclick="resetStatus(${c.id})">↺ Reset</button>` : ''}
          </div>
        </td>
      </tr>
    `).join('');
  }
  renderStats();
}

function renderStats() {
  const counts = { new:0, pending:0, interview:0, hired:0, rejected:0 };
  candidates.forEach(c => counts[c.status]++);
  document.getElementById('stats').innerHTML = `
    <span class="stat total">${candidates.length} Total</span>
    <span class="stat new">${counts.new} New</span>
    <span class="stat interview">${counts.interview} Interview</span>
    <span class="stat hired">${counts.hired} Hired</span>
    <span class="stat rejected">${counts.rejected} Rejected</span>
  `;
}

// ── FILTERS ──────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().startsWith(f === 'all' ? 'all' : STATUS_LABELS[f]?.toLowerCase().slice(0,4) || f));
  });
  // Simpler active state
  document.querySelectorAll('.filter-btn').forEach((b,i) => {
    const map = ['all','new','pending','interview','hired','rejected'];
    b.classList.toggle('active', map[i] === f);
  });
  render();
}

function setSearch(val) {
  currentSearch = val;
  render();
}

// ── MODAL SYSTEM ─────────────────────────────────────────────────────
function openSchedule(id) {
  const c = candidates.find(x => x.id === id);
  modalCandidateId = id;
  modalAction = 'interview';
  document.getElementById('modal-title').textContent = '📅 Schedule Interview';
  document.getElementById('modal-sub').textContent = `${c.name} — ${c.email}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-field">
      <label>Date & Time</label>
      <input type="datetime-local" id="m-datetime">
    </div>
    <div class="modal-field">
      <label>Meeting Link (Zoom / Google Meet)</label>
      <input type="url" id="m-link" placeholder="https://meet.google.com/...">
    </div>
    <div class="modal-field">
      <label>Portfolio Link (if received)</label>
      <input type="url" id="m-portfolio" placeholder="https://..." value="${c.portfolio}">
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="m-notes" placeholder="Any notes about this candidate...">${c.notes}</textarea>
    </div>
  `;
  document.getElementById('modal-confirm').className = 'btn-confirm';
  document.getElementById('modal-confirm').textContent = 'Schedule Interview';
  openModal();
}

function openHire(id) {
  const c = candidates.find(x => x.id === id);
  modalCandidateId = id;
  modalAction = 'hire';
  document.getElementById('modal-title').textContent = '✓ Hire Candidate';
  document.getElementById('modal-sub').textContent = `${c.name} — ${c.email}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-field">
      <label>Start Date</label>
      <input type="date" id="m-startdate">
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="m-notes" placeholder="Offer details, start date, etc...">${c.notes}</textarea>
    </div>
  `;
  document.getElementById('modal-confirm').className = 'btn-confirm';
  document.getElementById('modal-confirm').textContent = 'Confirm Hire';
  openModal();
}

function openReject(id) {
  const c = candidates.find(x => x.id === id);
  modalCandidateId = id;
  modalAction = 'reject';
  document.getElementById('modal-title').textContent = '✕ Reject Candidate';
  document.getElementById('modal-sub').textContent = `${c.name} — ${c.email}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-field">
      <label>Reason (optional)</label>
      <select id="m-reason">
        <option value="">Select reason...</option>
        <option>No portfolio provided</option>
        <option>Portfolio not relevant</option>
        <option>Experience too low</option>
        <option>Did not respond</option>
        <option>Position filled</option>
        <option>Other</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="m-notes" placeholder="Internal notes...">${c.notes}</textarea>
    </div>
  `;
  document.getElementById('modal-confirm').className = 'btn-confirm red';
  document.getElementById('modal-confirm').textContent = 'Confirm Reject';
  openModal();
}

function openNotes(id) {
  const c = candidates.find(x => x.id === id);
  modalCandidateId = id;
  modalAction = 'notes';
  document.getElementById('modal-title').textContent = '📝 Edit Notes';
  document.getElementById('modal-sub').textContent = `${c.name} — ${c.email}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-field">
      <label>Portfolio Link</label>
      <input type="url" id="m-portfolio" placeholder="https://..." value="${c.portfolio}">
    </div>
    <div class="modal-field">
      <label>Notes</label>
      <textarea id="m-notes" placeholder="Add notes about this candidate...">${c.notes}</textarea>
    </div>
  `;
  document.getElementById('modal-confirm').className = 'btn-confirm';
  document.getElementById('modal-confirm').textContent = 'Save';
  openModal();
}

function confirmModal() {
  const c = candidates.find(x => x.id === modalCandidateId);
  if (!c) return;

  if (modalAction === 'interview') {
    const dt = document.getElementById('m-datetime')?.value;
    const link = document.getElementById('m-link')?.value;
    const portfolio = document.getElementById('m-portfolio')?.value;
    const notes = document.getElementById('m-notes')?.value;
    c.status = 'interview';
    c.interview = dt ? new Date(dt).toLocaleString('en-GB', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    if (link) c.interview += (c.interview ? ' · ' : '') + link;
    if (portfolio) c.portfolio = portfolio;
    if (notes) c.notes = notes;
  } else if (modalAction === 'hire') {
    const notes = document.getElementById('m-notes')?.value;
    c.status = 'hired';
    if (notes) c.notes = notes;
  } else if (modalAction === 'reject') {
    const reason = document.getElementById('m-reason')?.value;
    const notes = document.getElementById('m-notes')?.value;
    c.status = 'rejected';
    c.notes = [reason, notes].filter(Boolean).join(' — ');
  } else if (modalAction === 'notes') {
    const portfolio = document.getElementById('m-portfolio')?.value;
    const notes = document.getElementById('m-notes')?.value;
    if (portfolio) c.portfolio = portfolio;
    c.notes = notes;
  }

  closeModal();
  render();
}

function resetStatus(id) {
  const c = candidates.find(x => x.id === id);
  if (c) { c.status = 'new'; c.interview = ''; render(); }
}

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function toggleEmailed(id) {
  const c = candidates.find(x => x.id === id);
  if (c) { c.emailed = !c.emailed; render(); }
}

// ── INIT ─────────────────────────────────────────────────────────────
render();
</script>

<!-- CV VIEWER MODAL -->
<div class="cv-modal-overlay" id="cv-overlay" onclick="closeCVOutside(event)">
  <div class="cv-modal">
    <div class="cv-modal-header">
      <div class="cv-name-row">
        <span class="cv-indicator" id="cv-indicator" style="display:none"></span>
        <span class="cv-modal-title" id="cv-modal-title">CV Viewer</span>
      </div>
      <button class="cv-modal-close" onclick="closeCV()">✕</button>
    </div>
    <div id="cv-content" style="display:flex;flex-direction:column;flex:1">
      <div class="cv-empty" id="cv-empty">
        <div class="cv-empty-icon">📄</div>
        <div class="cv-empty-text" id="cv-empty-text">No CV uploaded yet for this candidate.<br>Upload a PDF or image to view it here.</div>
        <input type="file" id="cv-file-input" accept=".pdf,.png,.jpg,.jpeg" style="display:none" onchange="handleCVUpload(event)">
        <button class="cv-upload-btn" onclick="document.getElementById('cv-file-input').click()">Upload CV</button>
      </div>
      <iframe id="cv-frame" class="cv-frame" style="display:none"></iframe>
    </div>
  </div>
</div>

</body>
</html>
